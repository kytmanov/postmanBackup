
name: Daily Postman Backup

on:
  schedule:
    - cron: '30 11 * * *'  # 10:30 UTC → 10:30 PM NZST, 11:30 PM NZDT
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      # Toggle this to control behavior. "true" => dry-run (no deletes, no backup)
      # "false" => perform real delete + run backup + commit/push
      DRY_RUN: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Inspect repo tree (debug)
        run: |
          echo "Working directory: $PWD"
          echo "Top-level tree:"
          ls -la
          echo "files/ subtree:"
          if [ -d files ]; then find files -maxdepth 2 -type d -print; fi

      # --- Prune only runs when DRY_RUN == "false" ---
      - name: Prune backups older than 30 days
        shell: bash
        run: |
          set -euo pipefail

          ROOT="files"
          CUTOFF_EPOCH=$(date -u -d "30 days ago" +%s)
          echo "UTC cutoff epoch: $CUTOFF_EPOCH (30 days ago)"
          echo "DRY_RUN=${DRY_RUN}"

          # Show which 'date' we are using (GNU coreutils expected on ubuntu-latest)
          date --version || true

          prune_base() {
            local BASE="$1"

            if [ ! -d "$BASE" ]; then
              echo "Skip: $BASE does not exist."
              return
            fi

            echo "Scanning base: $BASE"

            # Iterate workspace directories one level deep under BASE
            # Use NUL delimiters to be robust against spaces/special chars
            while IFS= read -r -d '' WORKSPACE_DIR; do
              echo "Workspace: $WORKSPACE_DIR"

              # Read immediate child directories (expected: MM-DD-YYYY)
              while IFS= read -r -d '' dname; do
                # Extract just the folder name component
                basename="$(basename "$dname")"

                if [[ "$basename" =~ ^([0-9]{2})-([0-9]{2})-([0-9]{4})$ ]]; then
                  mm="${BASH_REMATCH[1]}"
                  dd="${BASH_REMATCH[2]}"
                  yyyy="${BASH_REMATCH[3]}"

                  # Convert to ISO (YYYY-MM-DD) for unambiguous parsing
                  iso_date="${yyyy}-${mm}-${dd}"

                  # Compute epoch (UTC) from ISO
                  dir_epoch=$(date -u -d "${iso_date}" +%s 2>/dev/null || echo "invalid")
                  if [[ "$dir_epoch" == "invalid" ]]; then
                    echo "WARN: Could not parse date for '${basename}' (as ${iso_date}) — skipping."
                    continue
                  fi

                  if (( dir_epoch < CUTOFF_EPOCH )); then
                    if [[ "${DRY_RUN}" == "true" ]]; then
                      echo "[DRY RUN] Would delete: $dname (epoch: $dir_epoch)"
                    else
                      echo "Deleting: $dname (epoch: $dir_epoch)"
                      rm -rf "$dname"
                    fi
                  else
                    echo "Keeping:  $dname (epoch: $dir_epoch)"
                  fi
                else
                  echo "Skip (not MM-DD-YYYY): $basename"
                fi
              done < <(find "$WORKSPACE_DIR" -mindepth 1 -maxdepth 1 -type d -print0)

              # Clean up empty directories (only in non-dry runs)
              if [[ "${DRY_RUN}" != "true" ]]; then
                find "$WORKSPACE_DIR" -type d -empty -print -delete || true
              fi
            done < <(find "$BASE" -mindepth 1 -maxdepth 1 -type d -print0)
          }

          prune_base "files/collections"
          prune_base "files/environments"

      # --- Backup only runs when DRY_RUN == "false" ---
      - name: Set up Node.js
        if: ${{ env.DRY_RUN == 'false' }}
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        if: ${{ env.DRY_RUN == 'false' }}
        run: npm install

      - name: Run backup
        if: ${{ env.DRY_RUN == 'false' }}
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: node app.js

      - name: Commit and push changes
        if: ${{ env.DRY_RUN == 'false' }}
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -A
          git commit -m "Daily backup $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:master
