
name: Daily Postman Backup

on:
  schedule:
    - cron: '0 0 * * *'  # Runs daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: "true"   # flip to "false" after confirming logs

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Inspect repo tree (debug)
        run: |
          echo "Working directory: $PWD"
          echo "Top-level tree:"
          ls -la
          echo "files/ subtree:"
          if [ -d files ]; then find files -maxdepth 2 -type d -print; fi

      - name: Prune backups older than 30 days
        run: |
          set -euo pipefail

          ROOT="files"
          CUTOFF_EPOCH=$(date -u -d "30 days ago" +%s)
          echo "UTC cutoff epoch: $CUTOFF_EPOCH (30 days ago)"

          prune_base() {
            local BASE="$1"

            if [ ! -d "$BASE" ]; then
              echo "Skip: $BASE does not exist."
              return
            fi

            echo "Scanning base: $BASE"

            find "$BASE" -mindepth 1 -maxdepth 1 -type d -print | while read -r WORKSPACE_DIR; do
              echo "Workspace: $WORKSPACE_DIR"

              find "$WORKSPACE_DIR" -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | while read -r dname; do
                if [[ "$dname" =~ ^([0-9]{2})-([0-9]{2})-([0-9]{4})$ ]]; then
                  mm="${BASH_REMATCH[1]}"
                  dd="${BASH_REMATCH[2]}"
                  yyyy="${BASH_REMATCH[3]}"

                  dir_epoch=$(date -u -d "${mm}-${dd}-${yyyy}" +%s 2>/dev/null || echo "invalid")
                  if [[ "$dir_epoch" == "invalid" ]]; then
                    echo "WARN: Could not parse date for '$dname' — skipping."
                    continue
                  fi

                  if (( dir_epoch < CUTOFF_EPOCH )); then
                    if [[ "${DRY_RUN}" == "true" ]]; then
                      echo "[DRY RUN] Would delete: $WORKSPACE_DIR/$dname (epoch: $dir_epoch)"
                    else
                      echo "Deleting: $WORKSPACE_DIR/$dname (epoch: $dir_epoch)"
                      rm -rf "$WORKSPACE_DIR/$dname"
                    fi
                  else
                    echo "Keeping:  $WORKSPACE_DIR/$dname (epoch: $dir_epoch)"
                  fi
                else
                  echo "Skip (not MM-DD-YYYY): $dname"
                fi
              done

              find "$WORKSPACE_DIR" -type d -empty -print -delete || true
            done
          }

          prune_base "$ROOT/collections"
          prune_base "$ROOT/environments"

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run backup
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_WORKSPACE_ID: ${{ secrets.POSTMAN_WORKSPACE_ID }}
        run: node app.js

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -A
          git commit -m "Daily backup $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:master
